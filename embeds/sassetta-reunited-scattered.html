<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sassetta — Reunited &amp; Scattered</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#EFE6D0;
    --ink:#2E3A46;
    --gold:#A6813F;
    --grey:#8b8577;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; padding:0; width:100%; height:100%; background:var(--parchment); font-family:'Cormorant Garamond', serif; overflow:hidden; }

  #stage{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:26px;
    padding:0 20px;
  }

  .eyebrow{
    font-size:14px; letter-spacing:4px; text-transform:uppercase; color:var(--ink); opacity:0.6;
    text-align:center;
  }

  .row{
    display:flex; align-items:flex-end; gap:14px;
  }

  .ghost{
    width:38px; height:170px;
    opacity:0.35;
  }
  .ghost svg{ width:100%; height:100%; display:block; }

  .panel{
    position:relative;
    width:110px; height:300px;
    border-radius:55px 55px 6px 6px;
    overflow:hidden;
    background:var(--parchment);
    box-shadow:0 10px 22px rgba(0,0,0,0.28);
    transition: transform 0.3s ease;
  }
  .panel.gold{ border:4px solid var(--gold); }
  .panel.grey{ border:4px solid var(--grey); }
  .panel img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .panel.grey img{ filter:grayscale(0.55) opacity(0.75) contrast(0.95); }
  .panel.center{ width:130px; height:320px; }

  /* flip card for the Madonna / Francis-in-Glory panel */
  .flip-wrap{ perspective:1400px; width:130px; height:320px; }
  .flip-card{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform 0.8s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .flip-card.flipped{ transform:rotateY(180deg); }
  .flip-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:34px 34px 6px 6px;
    overflow:hidden;
    box-shadow:0 10px 22px rgba(0,0,0,0.28);
  }
  .flip-face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .flip-face.grey{ border:4px solid var(--grey); }
  .flip-face.grey img{ filter:grayscale(0.55) opacity(0.75) contrast(0.95); }
  .flip-face.gold{ border:4px solid var(--gold); }
  .flip-face.back{ transform:rotateY(180deg); }

  .flip-hint{
    position:absolute; top:8px; right:8px; z-index:2;
    width:24px; height:24px; border-radius:50%;
    background:rgba(46,58,70,0.55);
    display:flex; align-items:center; justify-content:center;
  }
  .flip-hint svg{ width:14px; height:14px; stroke:#fff; }

  .tag{
    position:absolute; left:50%; bottom:8px; transform:translateX(-50%);
    font-family:'Cormorant Garamond', serif; font-weight:600; letter-spacing:0.4px;
    text-transform:uppercase; font-size:8px;
    padding:2px 6px; border-radius:16px;
    white-space:nowrap;
  }
  .tag.gold{ background:rgba(166,129,63,0.92); color:#fff; }
  .tag.grey{ background:rgba(46,58,70,0.55); color:#fff; }

  .col{
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .name{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:13.5px; color:var(--ink); text-align:center; max-width:118px;
    line-height:1.25;
  }

  .legend{
    display:flex; gap:28px; align-items:center;
    color:var(--ink); font-size:15px; letter-spacing:0.5px;
  }
  .legend .item{ display:flex; align-items:center; gap:8px; }
  .swatch{ width:16px; height:16px; border-radius:50%; }
  .swatch.gold{ background:var(--gold); }
  .swatch.grey{ background:var(--grey); }
</style>
</head>

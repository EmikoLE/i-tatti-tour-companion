<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Borgo San Sepolcro Altarpiece — Two Sides</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#EFE6D0;
    --ink:#2E3A46;
    --gold:#A6813F;
    --terracotta:#9C5B44;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; padding:0; width:100%; height:100%; background:var(--parchment); font-family:'Cormorant Garamond', serif; overflow:hidden; }

  #stage{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px;
  }

  .heading{
    text-align:center;
    color:var(--ink);
  }
  .heading .eyebrow{
    font-size:14px; letter-spacing:4px; text-transform:uppercase; opacity:0.6;
  }
  .heading .title{
    font-style:italic; font-weight:600; font-size:26px; margin-top:2px;
  }

  .card-wrap{
    perspective:2400px;
    width:min(82vw, 620px);
    aspect-ratio: 506 / 424;
  }
  .card{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform 0.9s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }

  .face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:6px;
    box-shadow:0 18px 40px rgba(0,0,0,0.3);
    overflow:hidden;
    background:#EFE6D0;
    border:3px solid var(--gold);
  }
  .face img{ width:100%; height:100%; object-fit:contain; display:block; background:#EFE6D0; }
  .face.back{ transform:rotateY(180deg); }

  .face-label{
    position:absolute; left:0; right:0; bottom:0;
    padding:10px 14px 8px;
    background:linear-gradient(to top, rgba(46,58,70,0.72), transparent);
    color:#fff; text-align:center;
    font-family:'Cormorant Garamond', serif;
    letter-spacing:2px; text-transform:uppercase; font-size:13px; font-weight:600;
  }
  .face-label .sub{
    display:block; font-style:italic; text-transform:none; letter-spacing:0.5px; font-size:13px; opacity:0.9; margin-top:1px;
  }

  .hint{
    color:var(--ink); opacity:0.55; font-size:14px; letter-spacing:1px; font-style:italic;
    display:flex; align-items:center; gap:8px;
  }
  .hint svg{ width:16px; height:16px; }
</style>
</head>

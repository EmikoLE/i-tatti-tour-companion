<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sassetta — The Altarpiece Becomes a Triptych</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#EFE6D0;
    --ink:#2E3A46;
    --gold:#A6813F;
    --grey:#8b8577;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; padding:0; width:100%; height:100%; background:#12181f; font-family:'Cormorant Garamond', serif; overflow:hidden; }

  #viewport{ position:fixed; top:0; left:0; width:100%; display:flex; align-items:center; justify-content:center; }

  #canvas{
    position:relative; width:900px; height:560px;
    transform-origin:center center;
  }

  #altarpiece{
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.06), transparent 60%), #171d24;
    border-radius:6px; overflow:hidden;
    transition:opacity 1s ease;
    cursor:pointer;
  }

  #photo{
    position:absolute; inset:0; opacity:0; pointer-events:none;
    border-radius:6px; overflow:hidden;
    transition:opacity 1s ease;
  }
  #photo img{ width:100%; height:100%; object-fit:cover; object-position:top center; display:block; }

  .piece{
    position:absolute;
    border:4px solid var(--gold);
    border-radius:34px 34px 6px 6px;
    overflow:hidden;
    box-shadow:0 16px 34px rgba(0,0,0,0.45);
    transition: left 1.4s cubic-bezier(.6,0,.3,1), top 1.4s cubic-bezier(.6,0,.3,1),
                width 1.4s cubic-bezier(.6,0,.3,1), height 1.4s cubic-bezier(.6,0,.3,1),
                opacity 1s ease;
  }
  .piece.grey{ border-color:var(--grey); }
  .piece img{ width:100%; height:100%; object-fit:cover; display:block; }
  .piece.grey img{ filter:grayscale(0.55) opacity(0.75) contrast(0.95); }

  /* the Madonna / Francis flip piece has no border of its own — the border lives on each face */
  #p-madonna{ border:none; box-shadow:none; overflow:visible; background:transparent; }
  .flip-inner{ position:absolute; inset:0; perspective:1200px; }
  .flip-card{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform 0.9s cubic-bezier(.4,.2,.2,1);
  }
  .flip-card.flipped{ transform:rotateY(180deg); }
  .flip-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:34px 34px 6px 6px;
    overflow:hidden;
    box-shadow:0 16px 34px rgba(0,0,0,0.45);
  }
  .flip-face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .flip-face.grey{ border:4px solid var(--grey); }
  .flip-face.grey img{ filter:grayscale(0.55) opacity(0.75) contrast(0.95); }
  .flip-face.gold{ border:4px solid var(--gold); }
  .flip-face.back{ transform:rotateY(180deg); }

  .piece .tag, .flip-face .tag{
    position:absolute; left:50%; bottom:7px; transform:translateX(-50%);
    font-family:'Cormorant Garamond', serif; font-weight:600; letter-spacing:0.3px;
    text-transform:uppercase; font-size:7.5px; white-space:nowrap;
    padding:2px 5px; border-radius:14px; color:#fff;
    transition:opacity 0.5s ease;
  }
  .piece.gold .tag, .flip-face.gold .tag{ background:rgba(166,129,63,0.92); }
  .piece.grey .tag, .flip-face.grey .tag{ background:rgba(46,58,70,0.6); }

  .hint{
    position:absolute; bottom:14px; left:0; right:0; text-align:center;
    font-size:13px; font-style:italic; letter-spacing:1px; color:#EFE6D0; opacity:0.55;
    transition:opacity 0.3s ease;
  }
</style>
</head>

<script>
  const canvas = document.getElementById('canvas');
  const viewport = document.getElementById('viewport');
  function fit(){
    const vw = window.innerWidth, vh = window.innerHeight;
    viewport.style.height = vh + 'px';
    const scale = Math.min(vw/900, vh/560) * 0.94;
    canvas.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  fit();

  // ---- layout definitions ----
  // Stage 1: the altarpiece's true front register
  const front = {
    ranieri:    { left:150, top:90,  width:100, height:260 },
    baptist:    { left:264, top:90,  width:100, height:260 },
    madonna:    { left:378, top:70,  width:130, height:300 },
    evangelist: { left:522, top:90,  width:100, height:260 },
    anthony:    { left:636, top:90,  width:100, height:260 }
  };

  // Stage 2: the Berensons' invented triptych — Ranieri, the (now-flipped) Francis, and Baptist
  const triptych = {
    ranieri:    { left:230, top:110, width:150, height:340 },
    baptist:    { left:560, top:110, width:150, height:340 },
    madonna:    { left:388, top:80,  width:170, height:390 },
    evangelist: { left:378, top:230, width:110, height:180, opacity:0 },
    anthony:    { left:378, top:230, width:110, height:180, opacity:0 }
  };

  function apply(layout){
    for(const key in layout){
      const el = document.getElementById('p-' + key);
      const v = layout[key];
      el.style.left = v.left + 'px';
      el.style.top = v.top + 'px';
      el.style.width = v.width + 'px';
      el.style.height = v.height + 'px';
      el.style.opacity = (v.opacity === undefined) ? 1 : v.opacity;
    }
  }

  apply(front);

  const altarpiece = document.getElementById('altarpiece');
  const photo = document.getElementById('photo');
  const hint = document.getElementById('hint');
  const madonnaCard = document.getElementById('madonnaCard');
  let state = 'front'; // 'front' | 'busy' | 'photo'

  altarpiece.addEventListener('click', () => {
    if(state !== 'front') return;
    state = 'busy';
    hint.style.opacity = '0';

    const flipMs = 900;
    const holdAfterFlip = 900;   // pause so the reveal registers before anything moves
    const rearrangeMs = 1400;
    const holdBeforeMelt = 1400; // pause on the new triptych before melting

    // 1) flip the Madonna panel in place to reveal Francis in Glory
    madonnaCard.classList.add('flipped');

    // 2) after a pause, rearrange into the triptych (Francis's slot grows to centre stage)
    setTimeout(() => {
      apply(triptych);
    }, flipMs + holdAfterFlip);

    // 3) after settling, melt into the room photo
    setTimeout(() => {
      altarpiece.style.opacity = '0';
      altarpiece.style.pointerEvents = 'none';
      photo.style.opacity = '1';
      photo.style.pointerEvents = 'auto';
      state = 'photo';
    }, flipMs + holdAfterFlip + rearrangeMs + holdBeforeMelt);
  });

  photo.addEventListener('click', () => {
    if(state !== 'photo') return;
    photo.style.opacity = '0';
    photo.style.pointerEvents = 'none';
    altarpiece.style.opacity = '1';
    altarpiece.style.pointerEvents = 'auto';
    madonnaCard.classList.remove('flipped');
    apply(front);
    hint.style.opacity = '0.55';
    state = 'front';
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>I Tatti Tour Companion</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=17" />
</head>

<body>
  <main id="app">

    <section id="storyStage"></section>

    <section id="introTransition">
      <img src="assets/bernard and mary.jpg" class="introPhoto" alt="">
      <div class="introVeil"></div>

      <div id="introContent">
        <img src="assets/ITattilogo.png" id="introLogo" alt="I Tatti logo">
        <h1>The Berensons at I Tatti</h1>
      </div>
    </section>

    <section id="bookOpenTransition">
      <div id="bookOpenBackdrop"></div>

      <div id="bookOpenCard">
        <img src="assets/bernard and mary.jpg" alt="">
        <span>The Berensons at I Tatti</span>
      </div>
    </section>

    <section id="rotateOverlay">
      <img id="rotatePhoto" src="" alt="">
      <div class="rotateVeil"></div>
      <div id="rotateInstruction">Rotate to portrait</div>
      <div id="deviceIcon"></div>
    </section>

    <button id="homeButton" aria-label="Return to directory">
      <img src="assets/ITattilogo.png" alt="I Tatti">
    </button>

    <button id="slideTrayButton" aria-label="Open slide tray">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <button id="rotateIndicator" aria-label="Rotate suggestion">
      <span id="rotateIndicatorIcon"></span>
      <span id="rotateIndicatorTip">Rotate your phone for the best view</span>
    </button>

    <div id="dots"></div>

    <section id="directoryScreen" class="visible">
      <div class="directoryHaze"></div>

      <div id="directoryHeader">
        <img src="assets/ITattilogo.png" alt="I Tatti">
        <p>Tour Companion</p>
        <button id="onboardingReplay">How it works</button>
        <button id="designerToggle">Designer Mode</button>
      </div>

      <div id="bookGrid">
        <button class="bookCard active" data-pack="berensons">
          <img src="assets/bernard and mary.jpg" alt="">
          <span>The Berensons at I Tatti</span>
        </button>

        <button class="bookCard placeholder" data-pack="garden">
          <span>The Garden</span>
        </button>

        <button class="bookCard placeholder" data-pack="sassetta">
          <span>Salone Sassetta</span>
        </button>

        <button class="bookCard placeholder" data-pack="living">
          <span>Living at I Tatti</span>
        </button>

        <button class="bookCard placeholder" data-pack="today">
          <span>I Tatti Today</span>
        </button>
      </div>
    </section>

    <section id="routeDrawer">
      <div id="routeDrawerHeader">
        <p>Slides</p>
      </div>

      <div id="designerPanel">
        <div id="designerPresets"></div>
        <div id="designerActions">
          <input id="designerPresetName" type="text" placeholder="Tour name" />
          <button id="designerSaveNew">Save as new</button>
          <button id="designerSaveOver">Save</button>
        </div>
      </div>

      <div id="routeDrawerGrid"></div>
      <div id="dropIndicator"></div>

      <div id="customTrayScrollbar">
        <div id="customTrayThumb"></div>
      </div>
    </section>

    <section id="chapterClose">
      <img src="assets/ITattilogo.png" alt="I Tatti logo">
    </section>

    <section id="onboarding">
      <div id="onboardingBackdrop"></div>
      <div class="onboardingHaze"></div>

      <button id="onboardingSkip">Skip</button>

      <div id="onboardingCard">
        <p id="onboardingEyebrow"></p>
        <h2 id="onboardingTitle"></h2>

        <div id="onboardingVisual">
          <div class="onboardingVisualStep" data-step="0">
            <img src="assets/ITattilogo.png" class="onboardingLogo" alt="I Tatti logo">
          </div>

          <div class="onboardingVisualStep" data-step="1">
            <div class="swipeDemo">
              <span class="swipeArrow left">&#8249;</span>
              <span class="swipeArrow right">&#8250;</span>
            </div>
          </div>

          <div class="onboardingVisualStep" data-step="2">
            <div class="onboardingRotateIcon"></div>
          </div>

          <div class="onboardingVisualStep" data-step="3">
            <div class="reorderDemo">
              <span class="reorderThumb one"></span>
              <span class="reorderThumb two"></span>
              <span class="reorderThumb three"></span>
            </div>
          </div>

          <div class="onboardingVisualStep" data-step="4">
            <div class="menuDemo">
              <span class="menuDemoIcon logo"></span>
              <span class="menuDemoIcon tray">
                <span></span><span></span><span></span>
              </span>
            </div>
          </div>

          <div class="onboardingVisualStep" data-step="5">
            <img src="assets/ITattilogo.png" class="onboardingLogo" alt="I Tatti logo">
          </div>
        </div>

        <p id="onboardingBody"></p>
      </div>

      <div id="onboardingDots"></div>

      <div id="onboardingNav">
        <button id="onboardingBack">Back</button>
        <button id="onboardingNext">Next</button>
      </div>
    </section>

  </main>

  <script type="module" src="main.js?v=4"></script>
</body>
</html>
